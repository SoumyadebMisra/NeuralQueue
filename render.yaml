services:
  # Backend Orchestrator (Modular Monolith)
  - type: web
    name: neuralqueue-backend
    runtime: python
    region: oregon
    buildCommand: pip install -r backend/requirements.txt && cd backend && alembic upgrade head
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"
      - key: WORKER_CONCURRENCY
        value: "10"
